<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Projectinator">
  <title>Projectinator</title>
  <!-- Kanban board as a card staircase (3 → 2 → 1) with a check on the final,
       "done" card. Two-tone amber so it reads on any background, light or dark. -->
  <rect x="92"  y="156" width="96" height="56" rx="12" fill="#f4d489"/>
  <rect x="92"  y="228" width="96" height="56" rx="12" fill="#f4d489"/>
  <rect x="92"  y="300" width="96" height="56" rx="12" fill="#f4d489"/>
  <rect x="208" y="192" width="96" height="56" rx="12" fill="#f4d489"/>
  <rect x="208" y="264" width="96" height="56" rx="12" fill="#e0a72d"/>
  <rect x="324" y="228" width="96" height="56" rx="12" fill="#e0a72d"/>
  <path d="M348 256 l14 14 l26 -28" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
